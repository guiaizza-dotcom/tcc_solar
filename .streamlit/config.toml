[theme]
primaryColor = "#FFA500"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false
serverAddress = "tcc-solar-guiaizza.streamlit.app"
serverPort = 443
iconUrl = "https://raw.githubusercontent.com/guiaizza-dotcom/tcc_solar/main/app/icon.png"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[ui]
hideTopBar = false
hideFooterWatermark = false